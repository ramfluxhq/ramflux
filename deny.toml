[advisories]
version = 2
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
yanked = "deny"
# P3 keeps the dependency graph unchanged. These unmaintained-crate advisories
# are tracked as explicit follow-up migration work instead of silently hidden.
ignore = [
    "RUSTSEC-2023-0089", # atomic-polyfill via postcard/heapless
    "RUSTSEC-2025-0134", # rustls-pemfile direct PEM loader dependency
]

[licenses]
version = 2
allow = [
    "0BSD",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "CC0-1.0",
    "CDLA-Permissive-2.0",
    "ISC",
    "MIT",
    "MIT-0",
    "MPL-2.0",
    "Unicode-3.0",
    "Unlicense",
    "Zlib",
]
confidence-threshold = 0.8

[bans]
multiple-versions = "allow"
wildcards = "deny"
highlight = "all"
deny = [
    { name = "native-tls" },
    { name = "openssl" },
    { name = "openssl-sys" },
]

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
