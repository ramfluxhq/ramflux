name: CodeQL

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: "43 4 * * 2"

concurrency:
  group: codeql-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write

jobs:
  analyze:
    name: Analyze Rust
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@b9e0990d219a03df7633c93f6f005a8fecbcab22

      - name: Initialize CodeQL
        uses: github/codeql-action/init@a16f4a497336b68eeff8ef72868ea4bab1c672bb
        with:
          languages: rust

      - name: Build
        run: cargo build --workspace

      - name: Analyze
        uses: github/codeql-action/analyze@7c4a2585440bbc7499024911ad98cd011a05164f
