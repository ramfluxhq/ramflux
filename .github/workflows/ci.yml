name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  provenance:
    name: Provenance gate
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@b9e0990d219a03df7633c93f6f005a8fecbcab22

      - name: SPDX headers and crate licenses
        run: ./scripts/check-license-headers.sh

  rust:
    name: Rust checks
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - name: Checkout
        uses: actions/checkout@b9e0990d219a03df7633c93f6f005a8fecbcab22

      - name: Cache
        uses: Swatinem/rust-cache@7e35be21c2b94d972b1143087fabc27d7dc881ef

      - name: Install cargo-machete
        run: cargo install cargo-machete --locked

      - name: Format
        run: cargo fmt --check --all

      - name: Clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      - name: Cargo machete
        # Unused-dependency detection is advisory: cargo-machete has known false
        # positives on workspace-inherited deps, so a finding reports but must
        # not block CI. Real unused deps are pruned in the manifests directly.
        continue-on-error: true
        run: cargo machete

      - name: Test
        run: cargo test --workspace
