name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish"
        required: false
        type: string

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    permissions:
      contents: write
      id-token: write
      attestations: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive_ext: tar.gz
          - os: macos-latest
            target: aarch64-apple-darwin
            archive_ext: tar.gz

    steps:
      - name: Checkout
        uses: actions/checkout@e8d4307400f9427dba7cb98e488d6ab85f1cec5f

      - name: Cache
        uses: Swatinem/rust-cache@baf1a810e98b6a3001d0d7234864ed75a17c42fb
        with:
          key: release-${{ matrix.target }}

      - name: Add target
        run: rustup target add ${{ matrix.target }}

      - name: Build
        run: |
          set -euo pipefail
          cargo build --locked --release --target "${{ matrix.target }}" --workspace

      - name: Package
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME}"
          if [ -n "${{ inputs.tag || '' }}" ]; then
            version="${{ inputs.tag }}"
          fi
          dist="dist/ramflux-${version}-${{ matrix.target }}"
          mkdir -p "$dist"
          for bin in \
            ramflux-gateway ramflux-router ramflux-notify ramflux-federation \
            ramflux-relay ramflux-signaling ramflux-retention rf
          do
            cp "target/${{ matrix.target }}/release/${bin}" "$dist/"
          done
          tar -C dist -czf "${dist}.tar.gz" "$(basename "$dist")"
          shasum -a 256 "${dist}.tar.gz" > "${dist}.tar.gz.sha256"

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6

      - name: Keyless sign artifact
        shell: bash
        run: |
          set -euo pipefail
          for artifact in dist/*.tar.gz; do
            test -n "$artifact"
            cosign sign-blob --yes \
              --output-signature "${artifact}.sig" \
              --output-certificate "${artifact}.pem" \
              --bundle "${artifact}.cosign.bundle" \
              "$artifact"
          done

      - name: Attest artifact provenance
        uses: actions/attest-build-provenance@f14352a605c57b0a66e0d49bba5825967f1dbedf
        with:
          subject-path: "dist/*.tar.gz"

      - name: Upload release artifact
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          files: |
            dist/*.tar.gz
            dist/*.sha256
            dist/*.sig
            dist/*.pem
            dist/*.cosign.bundle

  sbom-and-sign:
    name: SBOM, signatures, provenance
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: build
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - name: Checkout
        uses: actions/checkout@e8d4307400f9427dba7cb98e488d6ab85f1cec5f

      - name: Install SBOM tooling
        run: cargo install cargo-cyclonedx --locked

      - name: Generate SBOM
        run: |
          set -euo pipefail
          rm -rf dist/sbom
          mkdir -p dist/sbom
          find apps crates -name "ramflux-sbom.json" -delete
          cargo cyclonedx --all --format json --override-filename ramflux-sbom
          while IFS= read -r sbom; do
            dest="dist/sbom/${sbom}"
            mkdir -p "$(dirname "$dest")"
            mv "$sbom" "$dest"
          done < <(find apps crates -name "ramflux-sbom.json" | sort)
          test "$(find dist/sbom -name "ramflux-sbom.json" | wc -l)" -gt 0
          tar -C dist -czf dist/ramflux-sbom.cdx.tar.gz sbom
          shasum -a 256 dist/ramflux-sbom.cdx.tar.gz > dist/ramflux-sbom.cdx.tar.gz.sha256

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6

      - name: Keyless sign SBOM
        run: |
          set -euo pipefail
          cosign sign-blob --yes \
            --output-signature dist/ramflux-sbom.cdx.tar.gz.sig \
            --output-certificate dist/ramflux-sbom.cdx.tar.gz.pem \
            --bundle dist/ramflux-sbom.cdx.tar.gz.cosign.bundle \
            dist/ramflux-sbom.cdx.tar.gz

      - name: Attest SBOM provenance
        uses: actions/attest-build-provenance@f14352a605c57b0a66e0d49bba5825967f1dbedf
        with:
          subject-path: "dist/ramflux-sbom.cdx.tar.gz"

      - name: Upload SBOM
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          files: |
            dist/ramflux-sbom.cdx.tar.gz
            dist/ramflux-sbom.cdx.tar.gz.sha256
            dist/ramflux-sbom.cdx.tar.gz.sig
            dist/ramflux-sbom.cdx.tar.gz.pem
            dist/ramflux-sbom.cdx.tar.gz.cosign.bundle

  image-dry-run:
    name: REL-O4-01 image dry-run ${{ matrix.bin }}
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - bin: ramflux-gateway
            image: ghcr.io/ramfluxhq/ramflux-gateway
          - bin: ramflux-router
            image: ghcr.io/ramfluxhq/ramflux-router
          - bin: ramflux-notify
            image: ghcr.io/ramfluxhq/ramflux-notify
          - bin: ramflux-federation
            image: ghcr.io/ramfluxhq/ramflux-federation
          - bin: ramflux-relay
            image: ghcr.io/ramfluxhq/ramflux-relay
          - bin: ramflux-signaling
            image: ghcr.io/ramfluxhq/ramflux-signaling
          - bin: ramflux-retention
            image: ghcr.io/ramfluxhq/ramflux-retention
    steps:
      - name: Checkout
        uses: actions/checkout@e8d4307400f9427dba7cb98e488d6ab85f1cec5f

      - name: Set up QEMU
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051
        with:
          images: ${{ matrix.image }}
          tags: |
            type=raw,value=${{ inputs.tag || github.ref_name }}

      # REL-O4-01 dry-run only: GHCR push, image signing, and package publication
      # remain owner-gated until packages:write/tag/release approval is granted.
      - name: Build image dry-run
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8
        with:
          context: .
          file: deploy/Dockerfile
          target: source-runtime
          build-args: |
            BIN=${{ matrix.bin }}
          platforms: linux/amd64,linux/arm64
          push: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: true
          sbom: true
