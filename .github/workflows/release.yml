name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish"
        required: false
        type: string

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive_ext: tar.gz
            use_cross: false
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            archive_ext: tar.gz
            use_cross: true
          - os: macos-14
            target: x86_64-apple-darwin
            archive_ext: tar.gz
            use_cross: false
          - os: macos-14
            target: aarch64-apple-darwin
            archive_ext: tar.gz
            use_cross: false
          - os: ubuntu-latest
            target: x86_64-pc-windows-gnu
            archive_ext: tar.gz
            use_cross: true
          - os: ubuntu-latest
            target: aarch64-pc-windows-gnullvm
            archive_ext: tar.gz
            use_cross: true

    steps:
      - name: Checkout
        uses: actions/checkout@b9e0990d219a03df7633c93f6f005a8fecbcab22

      - name: Cache
        uses: Swatinem/rust-cache@baf1a810e98b6a3001d0d7234864ed75a17c42fb
        with:
          key: release-${{ matrix.target }}

      - name: Install cross
        if: matrix.use_cross
        run: cargo install cross --git https://github.com/cross-rs/cross --rev 668b7ca614152067f5f23b9e7303f0c2b871b8a7

      - name: Add target
        if: ${{ !matrix.use_cross }}
        run: rustup target add ${{ matrix.target }}

      - name: Build
        run: |
          set -euo pipefail
          if [ "${{ matrix.use_cross }}" = "true" ]; then
            cross build --locked --release --target "${{ matrix.target }}" --workspace
          else
            cargo build --locked --release --target "${{ matrix.target }}" --workspace
          fi

      - name: Package
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME}"
          if [ -n "${{ inputs.tag || '' }}" ]; then
            version="${{ inputs.tag }}"
          fi
          dist="dist/ramflux-${version}-${{ matrix.target }}"
          mkdir -p "$dist"
          exe=""
          case "${{ matrix.target }}" in
            *windows*) exe=".exe" ;;
          esac
          for bin in \
            ramflux-gateway ramflux-router ramflux-notify ramflux-federation \
            ramflux-relay ramflux-signaling ramflux-retention rf
          do
            cp "target/${{ matrix.target }}/release/${bin}${exe}" "$dist/"
          done
          tar -C dist -czf "${dist}.tar.gz" "$(basename "$dist")"
          shasum -a 256 "${dist}.tar.gz" > "${dist}.tar.gz.sha256"

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6

      - name: Keyless sign artifact
        shell: bash
        run: |
          set -euo pipefail
          for artifact in dist/*.tar.gz; do
            cosign sign-blob --yes \
              --output-signature "${artifact}.sig" \
              --output-certificate "${artifact}.pem" \
              "$artifact"
          done

      - name: Attest artifact provenance
        uses: actions/attest-build-provenance@f14352a605c57b0a66e0d49bba5825967f1dbedf
        with:
          subject-path: "dist/*.tar.gz"

      - name: Upload release artifact
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          files: |
            dist/*.tar.gz
            dist/*.sha256
            dist/*.sig
            dist/*.pem

  sbom-and-sign:
    name: SBOM, signatures, provenance
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@b9e0990d219a03df7633c93f6f005a8fecbcab22

      - name: Install SBOM tooling
        run: cargo install cargo-cyclonedx --locked

      - name: Generate SBOM
        run: |
          set -euo pipefail
          mkdir -p dist
          cargo cyclonedx --workspace --all --format json --output-cdx --override-filename ramflux-sbom
          mv ramflux-sbom.cdx.json dist/ramflux-sbom.cdx.json
          shasum -a 256 dist/ramflux-sbom.cdx.json > dist/ramflux-sbom.cdx.json.sha256

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6

      - name: Keyless sign SBOM
        run: |
          set -euo pipefail
          cosign sign-blob --yes \
            --output-signature dist/ramflux-sbom.cdx.json.sig \
            --output-certificate dist/ramflux-sbom.cdx.json.pem \
            dist/ramflux-sbom.cdx.json

      - name: Attest SBOM provenance
        uses: actions/attest-build-provenance@f14352a605c57b0a66e0d49bba5825967f1dbedf
        with:
          subject-path: "dist/ramflux-sbom.cdx.json"

      - name: Upload SBOM
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          files: |
            dist/ramflux-sbom.cdx.json
            dist/ramflux-sbom.cdx.json.sha256
            dist/ramflux-sbom.cdx.json.sig
            dist/ramflux-sbom.cdx.json.pem
