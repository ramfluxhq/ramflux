services:
  ramflux-gateway:
    build:
      context: .
      dockerfile: Dockerfile.itest
      args:
        BIN: ramflux-gateway
    command: ["--config", "/etc/ramflux/config/gateway.toml"]
    environment:
      RAMFLUX_NODE_ID: "${RAMFLUX_NODE_ID:-localhost}"
      RAMFLUX_ITEST_HTTP: "1"
      RAMFLUX_ITEST_PERF: "${RAMFLUX_ITEST_PERF:-0}"
      RAMFLUX_NODE_SERVICE_SIGNING_SEED_B64URL: "${RAMFLUX_NODE_SERVICE_SIGNING_SEED_B64URL:-AQIDBAUGBwgJCgsMDQ4PEBESExQVFhcYGRobHB0eHyA}"
      RAMFLUX_ITEST_GATEWAY_HTTP_ADDR: "0.0.0.0:18081"
      RAMFLUX_ITEST_GATEWAY_QUIC_ADDR: "0.0.0.0:18443"
      RAMFLUX_ITEST_GATEWAY_TCP_ADDR: "0.0.0.0:18443"
      RAMFLUX_ITEST_GATEWAY_FRAME_DELAY_MS: "${RAMFLUX_ITEST_GATEWAY_FRAME_DELAY_MS:-0}"
      RAMFLUX_GATEWAY_QUIC_WORKER_THREADS: "${RAMFLUX_GATEWAY_QUIC_WORKER_THREADS:-}"
      RAMFLUX_GATEWAY_QUIC_MAX_CONCURRENT_BIDI_STREAMS: "${RAMFLUX_GATEWAY_QUIC_MAX_CONCURRENT_BIDI_STREAMS:-4096}"
      RAMFLUX_GATEWAY_QUIC_RECEIVE_WINDOW: "${RAMFLUX_GATEWAY_QUIC_RECEIVE_WINDOW:-16777216}"
      RAMFLUX_GATEWAY_QUIC_STREAM_RECEIVE_WINDOW: "${RAMFLUX_GATEWAY_QUIC_STREAM_RECEIVE_WINDOW:-1048576}"
      RAMFLUX_GATEWAY_QUIC_SEND_WINDOW: "${RAMFLUX_GATEWAY_QUIC_SEND_WINDOW:-16777216}"
      RAMFLUX_GATEWAY_ITEST_CAPTURE_JSON: "${RAMFLUX_GATEWAY_ITEST_CAPTURE_JSON:-/tmp/ramflux-gateway-itest-capture.jsonl}"
      RAMFLUX_ROUTER_ASYNC_ENDPOINT: "ramflux-router:17444"
      RAMFLUX_ROUTER_ASYNC_SERVER_NAME: "ramflux-router"
      RAMFLUX_ROUTER_ASYNC_PEER_CA_PEM_FILE: "/etc/ramflux/mesh/ca.pem"
      RAMFLUX_ROUTER_ASYNC_POOL_SIZE: "${RAMFLUX_ROUTER_ASYNC_POOL_SIZE:-8}"
      RAMFLUX_NOTIFY_MESH_ENDPOINT: "ramflux-notify:18085"
      RAMFLUX_NOTIFY_MESH_SERVER_NAME: "ramflux-notify"
      RAMFLUX_NOTIFY_MESH_PEER_CA_PEM_FILE: "/etc/ramflux/mesh/ca.pem"
      RAMFLUX_MESH_QUIC_CLIENT_POOL_SIZE: "${RAMFLUX_MESH_QUIC_CLIENT_POOL_SIZE:-8}"
      RAMFLUX_MESH_QUIC_MAX_CONCURRENT_BIDI_STREAMS: "${RAMFLUX_MESH_QUIC_MAX_CONCURRENT_BIDI_STREAMS:-4096}"
      RAMFLUX_MESH_QUIC_RECEIVE_WINDOW: "${RAMFLUX_MESH_QUIC_RECEIVE_WINDOW:-16777216}"
      RAMFLUX_MESH_QUIC_STREAM_RECEIVE_WINDOW: "${RAMFLUX_MESH_QUIC_STREAM_RECEIVE_WINDOW:-1048576}"
      RAMFLUX_MESH_QUIC_SEND_WINDOW: "${RAMFLUX_MESH_QUIC_SEND_WINDOW:-16777216}"
    volumes:
      - ./config/gateway.toml:/etc/ramflux/config/gateway.toml:ro
      - ${RAMFLUX_CERTS_DIR:-./certs}/gateway:/etc/ramflux/mesh:ro
      - gateway-redb:/var/lib/ramflux/gateway
    depends_on: [ramflux-router, ramflux-retention]
    ports:
      - "${RAMFLUX_ITEST_GATEWAY_HTTP_PORT:-18081}:18081"
      - "${RAMFLUX_ITEST_GATEWAY_QUIC_PORT:-18443}:18443/udp"
      - "${RAMFLUX_ITEST_GATEWAY_TCP_PORT:-18443}:18443/tcp"
    networks:
      default: {}
    healthcheck:
      test: ["CMD", "/usr/local/bin/ramflux-gateway", "--health-check"]
      interval: 5s
      timeout: 2s
      retries: 12

  ramflux-router:
    build:
      context: .
      dockerfile: Dockerfile.itest
      args:
        BIN: ramflux-router
    command: ["--config", "/etc/ramflux/config/router.toml"]
    environment:
      RAMFLUX_NODE_ID: "${RAMFLUX_NODE_ID:-localhost}"
      RAMFLUX_ITEST_HTTP: "1"
      RAMFLUX_ITEST_PERF: "${RAMFLUX_ITEST_PERF:-0}"
      RAMFLUX_NODE_SERVICE_SIGNING_SEED_B64URL: "${RAMFLUX_NODE_SERVICE_SIGNING_SEED_B64URL:-AQIDBAUGBwgJCgsMDQ4PEBESExQVFhcYGRobHB0eHyA}"
      RAMFLUX_ITEST_ROUTER_HTTP_ADDR: "0.0.0.0:18080"
      RAMFLUX_ROUTER_GROUP_COMMIT: "${RAMFLUX_ROUTER_GROUP_COMMIT:-0}"
      RAMFLUX_ROUTER_ASYNC_INGRESS: "1"
      RAMFLUX_ROUTER_ASYNC_INGRESS_RUNTIME: "${RAMFLUX_ROUTER_ASYNC_INGRESS_RUNTIME:-tokio}"
      RAMFLUX_ROUTER_ASYNC_LISTEN_ADDR: "0.0.0.0:17444"
      RAMFLUX_ROUTER_ASYNC_INGRESS_SOCKETS: "${RAMFLUX_ROUTER_ASYNC_INGRESS_SOCKETS:-1}"
      RAMFLUX_ROUTER_ASYNC_WORKER_THREADS: "${RAMFLUX_ROUTER_ASYNC_WORKER_THREADS:-}"
      RAMFLUX_ROUTER_WAL_BATCH_MAX: "${RAMFLUX_ROUTER_WAL_BATCH_MAX:-256}"
      RAMFLUX_ROUTER_WAL_QUEUE_CAPACITY: "${RAMFLUX_ROUTER_WAL_QUEUE_CAPACITY:-4096}"
      RAMFLUX_ROUTER_WAL_COMMIT_WINDOW_US: "${RAMFLUX_ROUTER_WAL_COMMIT_WINDOW_US:-0}"
      RAMFLUX_ROUTER_WAL_PIPELINE: "${RAMFLUX_ROUTER_WAL_PIPELINE:-0}"
      RAMFLUX_ROUTER_WAL_DIR: "${RAMFLUX_ROUTER_WAL_DIR:-}"
      RAMFLUX_ROUTER_WAL_SHARDS: "${RAMFLUX_ROUTER_WAL_SHARDS:-}"
      RAMFLUX_MESH_QUIC_MAX_CONCURRENT_BIDI_STREAMS: "${RAMFLUX_MESH_QUIC_MAX_CONCURRENT_BIDI_STREAMS:-4096}"
      RAMFLUX_MESH_QUIC_RECEIVE_WINDOW: "${RAMFLUX_MESH_QUIC_RECEIVE_WINDOW:-16777216}"
      RAMFLUX_MESH_QUIC_STREAM_RECEIVE_WINDOW: "${RAMFLUX_MESH_QUIC_STREAM_RECEIVE_WINDOW:-1048576}"
      RAMFLUX_MESH_QUIC_SEND_WINDOW: "${RAMFLUX_MESH_QUIC_SEND_WINDOW:-16777216}"
      RAMFLUX_ROUTER_ADMIN_TOKEN: "ramflux-local-admin-token"
      RAMFLUX_ROUTER_FEDERATION_FORWARD_URL: "http://ramflux-federation:18084/internal/home-node-migration/forward"
      RAMFLUX_ROUTER_FEDERATION_FORWARD_TOKEN: "ramflux-local-admin-token"
    volumes:
      - ./config/router.toml:/etc/ramflux/config/router.toml:ro
      - ${RAMFLUX_CERTS_DIR:-./certs}/router:/etc/ramflux/mesh:ro
      - router-redb:/var/lib/ramflux/router
    # RAM-backed mount for the router WAL, used only when RAMFLUX_ROUTER_WAL_DIR
    # points here (perf isolation of fsync/disk from the architecture ceiling).
    tmpfs:
      - /var/lib/ramflux/router-wal:size=2147483648
    ports:
      - "${RAMFLUX_ITEST_ROUTER_HTTP_PORT:-18080}:18080"
      - "${RAMFLUX_ITEST_ROUTER_MESH_PORT:-17443}:7443"
      # NOTE: the async QUIC ingress (17444) is reached container-to-container over
      # the compose network (gateway -> ramflux-router:17444); it deliberately has
      # NO host port mapping. A fixed host mapping collided on the host in two-node
      # tests (node-a and node-b both binding host 17444), starving node-b and
      # hanging federation/discovery/friend tests.
    # The optional compio/io_uring async ingress needs the io_uring_setup/enter/
    # register syscalls, which podman's default seccomp profile returns ENOSYS for
    # ("Function not implemented"). Relax seccomp for this itest-only router so the
    # RAMFLUX_ROUTER_ASYNC_INGRESS_RUNTIME=compio path can start; the default tokio
    # ingress does not require this.
    security_opt:
      - seccomp=unconfined
    networks:
      default: {}
    healthcheck:
      test: ["CMD", "/usr/local/bin/ramflux-router", "--health-check"]
      interval: 5s
      timeout: 2s
      retries: 12

  ramflux-notify:
    build:
      context: .
      dockerfile: Dockerfile.itest
      args:
        BIN: ramflux-notify
    command: ["--config", "/etc/ramflux/config/notify.toml"]
    environment:
      RAMFLUX_NODE_ID: "${RAMFLUX_NODE_ID:-localhost}"
      RAMFLUX_ITEST_HTTP: "1"
      RAMFLUX_NODE_SERVICE_SIGNING_SEED_B64URL: "${RAMFLUX_NODE_SERVICE_SIGNING_SEED_B64URL:-AQIDBAUGBwgJCgsMDQ4PEBESExQVFhcYGRobHB0eHyA}"
      RAMFLUX_ITEST_NOTIFY_HTTP_ADDR: "0.0.0.0:18083"
      RAMFLUX_NOTIFY_MESH_LISTEN_ADDR: "0.0.0.0:18085"
    volumes:
      - ./config/notify.toml:/etc/ramflux/config/notify.toml:ro
      - ${RAMFLUX_CERTS_DIR:-./certs}/notify:/etc/ramflux/mesh:ro
      - notify-redb:/var/lib/ramflux/notify
    ports:
      - "${RAMFLUX_ITEST_NOTIFY_HTTP_PORT:-18083}:18083"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      default: {}
    healthcheck:
      test: ["CMD", "/usr/local/bin/ramflux-notify", "--health-check"]
      interval: 5s
      timeout: 2s
      retries: 12

  ramflux-federation:
    build:
      context: .
      dockerfile: Dockerfile.itest
      args:
        BIN: ramflux-federation
    command: ["--config", "/etc/ramflux/config/federation.toml"]
    environment:
      RAMFLUX_NODE_ID: "${RAMFLUX_NODE_ID:-localhost}"
      RAMFLUX_ITEST_HTTP: "1"
      RAMFLUX_ITEST_PERF: "${RAMFLUX_ITEST_PERF:-0}"
      RAMFLUX_ITEST_FEDERATION_HTTP_ADDR: "0.0.0.0:18082"
      RAMFLUX_FEDERATION_ADMIN_ADDR: "0.0.0.0:18084"
      RAMFLUX_FEDERATION_ADMIN_TOKEN: "ramflux-local-admin-token"
      RAMFLUX_FEDERATION_NODE_ID: "${RAMFLUX_FEDERATION_NODE_ID:-localhost}"
      RAMFLUX_FEDERATION_PUBLIC_ENDPOINT: "${RAMFLUX_FEDERATION_PUBLIC_ENDPOINT:-ramflux-federation:7443}"
      RAMFLUX_FEDERATION_NODE_SIGNING_SEED_B64URL: "${RAMFLUX_FEDERATION_NODE_SIGNING_SEED_B64URL:-AQIDBAUGBwgJCgsMDQ4PEBESExQVFhcYGRobHB0eHyA}"
      RAMFLUX_FEDERATION_FORCE_TCP_MESH: "${RAMFLUX_FEDERATION_FORCE_TCP_MESH:-0}"
      RAMFLUX_FEDERATION_DISABLE_TCP_FALLBACK: "${RAMFLUX_FEDERATION_DISABLE_TCP_FALLBACK:-0}"
      RAMFLUX_FEDERATION_DISABLE_QUIC_LISTENER: "${RAMFLUX_FEDERATION_DISABLE_QUIC_LISTENER:-0}"
      RAMFLUX_MESH_QUIC_RECEIVE_WINDOW: "${RAMFLUX_MESH_QUIC_RECEIVE_WINDOW:-16777216}"
      RAMFLUX_MESH_QUIC_STREAM_RECEIVE_WINDOW: "${RAMFLUX_MESH_QUIC_STREAM_RECEIVE_WINDOW:-1048576}"
      RAMFLUX_MESH_QUIC_SEND_WINDOW: "${RAMFLUX_MESH_QUIC_SEND_WINDOW:-16777216}"
    volumes:
      - ./config/federation.toml:/etc/ramflux/config/federation.toml:ro
      - ${RAMFLUX_CERTS_DIR:-./certs}/federation:/etc/ramflux/mesh:ro
      - federation-redb:/var/lib/ramflux/federation
    ports:
      - "${RAMFLUX_ITEST_FEDERATION_HTTP_PORT:-18082}:18082"
      - "${RAMFLUX_ITEST_FEDERATION_MESH_PORT:-18482}:7443/tcp"
      - "${RAMFLUX_ITEST_FEDERATION_MESH_PORT:-18482}:7443/udp"
    networks:
      default: {}
      ramflux-itest-mesh:
        aliases:
          - "${RAMFLUX_ITEST_FEDERATION_DNS_ALIAS:-ramflux-federation}"
    healthcheck:
      test: ["CMD", "/usr/local/bin/ramflux-federation", "--health-check"]
      interval: 5s
      timeout: 2s
      retries: 12

  ramflux-relay:
    build:
      context: .
      dockerfile: Dockerfile.itest
      args:
        BIN: ramflux-relay
    command: ["--config", "/etc/ramflux/config/relay.toml"]
    environment:
      RAMFLUX_NODE_ID: "${RAMFLUX_NODE_ID:-localhost}"
      RAMFLUX_ITEST_HTTP: "1"
      RAMFLUX_ITEST_RELAY_HTTP_ADDR: "0.0.0.0:18084"
      RAMFLUX_ITEST_RELAY_MEDIA_UDP_ADDR: "0.0.0.0:19000"
      RAMFLUX_RELAY_ALLOW_PRIVATE_TARGETS: "1"
      RAMFLUX_RELAY_ITEST_CAPTURE_JSON: "${RAMFLUX_RELAY_ITEST_CAPTURE_JSON:-/tmp/ramflux-relay-itest-capture.jsonl}"
    volumes:
      - ./config/relay.toml:/etc/ramflux/config/relay.toml:ro
      - ${RAMFLUX_CERTS_DIR:-./certs}/relay:/etc/ramflux/mesh:ro
      - relay-redb:/var/lib/ramflux/relay
    ports:
      - "${RAMFLUX_ITEST_RELAY_HTTP_PORT:-18084}:18084"
      - "${RAMFLUX_ITEST_RELAY_MEDIA_UDP_PORT:-19000}:19000/udp"
    networks:
      default: {}
    healthcheck:
      test: ["CMD", "/usr/local/bin/ramflux-relay", "--health-check"]
      interval: 5s
      timeout: 2s
      retries: 12

  ramflux-signaling:
    build:
      context: .
      dockerfile: Dockerfile.itest
      args:
        BIN: ramflux-signaling
    command: ["--config", "/etc/ramflux/config/signaling.toml"]
    environment:
      RAMFLUX_NODE_ID: "${RAMFLUX_NODE_ID:-localhost}"
      RAMFLUX_ITEST_HTTP: "1"
      RAMFLUX_ITEST_SIGNALING_TURN_UDP_ADDR: "0.0.0.0:3478"
    volumes:
      - ./config/signaling.toml:/etc/ramflux/config/signaling.toml:ro
      - ${RAMFLUX_CERTS_DIR:-./certs}/signaling:/etc/ramflux/mesh:ro
      - signaling-redb:/var/lib/ramflux/signaling
    ports:
      - "${RAMFLUX_ITEST_SIGNALING_TURN_UDP_PORT:-3478}:3478/udp"
      - "${RAMFLUX_ITEST_SIGNALING_TURN_TCP_PORT:-3478}:3478/tcp"
    networks:
      default: {}
    healthcheck:
      test: ["CMD", "/usr/local/bin/ramflux-signaling", "--health-check"]
      interval: 5s
      timeout: 2s
      retries: 12

  ramflux-retention:
    build:
      context: .
      dockerfile: Dockerfile.itest
      args:
        BIN: ramflux-retention
    command: ["--config", "/etc/ramflux/config/retention.toml"]
    environment:
      RAMFLUX_NODE_ID: "${RAMFLUX_NODE_ID:-localhost}"
      RAMFLUX_ITEST_HTTP: "1"
      RAMFLUX_ITEST_RETENTION_HTTP_ADDR: "0.0.0.0:18087"
    volumes:
      - ./config/retention.toml:/etc/ramflux/config/retention.toml:ro
      - ${RAMFLUX_CERTS_DIR:-./certs}/retention:/etc/ramflux/mesh:ro
      - retention-redb:/var/lib/ramflux/retention
    ports:
      - "${RAMFLUX_ITEST_RETENTION_HTTP_PORT:-18087}:18087"
    networks:
      default: {}
    healthcheck:
      test: ["CMD", "/usr/local/bin/ramflux-retention", "--health-check"]
      interval: 5s
      timeout: 2s
      retries: 12

volumes:
  gateway-redb: {}
  router-redb: {}
  notify-redb: {}
  federation-redb: {}
  relay-redb: {}
  signaling-redb: {}
  retention-redb: {}

networks:
  default: {}
  ramflux-itest-mesh:
    name: "${RAMFLUX_ITEST_SHARED_NETWORK:-ramflux-itest-mesh}"
    external: true
