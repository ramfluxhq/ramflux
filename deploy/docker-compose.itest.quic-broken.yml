services:
  ramflux-gateway:
    environment:
      # Keep the gateway QUIC-first client enabled; the router overlay below
      # closes the callee listener so this exercises runtime fallback, not opt-out.
      RAMFLUX_ROUTER_ASYNC_ENDPOINT: "ramflux-router:17444"

  ramflux-router:
    environment:
      RAMFLUX_ROUTER_ASYNC_INGRESS: "0"

  ramflux-federation:
    environment:
      # Federation clients still resolve/use the public endpoint from the base
      # compose env; only the receiving QUIC listener is disabled.
      RAMFLUX_FEDERATION_DISABLE_QUIC_LISTENER: "1"
      RAMFLUX_FEDERATION_FORCE_TCP_MESH: "0"
      RAMFLUX_FEDERATION_DISABLE_TCP_FALLBACK: "0"

  ramflux-relay:
    environment:
      # Keep relay -> retention QUIC-first enabled; retention disables ingress
      # below so relay must fall back to the blocking mesh.
      RAMFLUX_RETENTION_ASYNC_ENDPOINT: "ramflux-retention:17446"
      RAMFLUX_RETENTION_ASYNC_SERVER_NAME: "ramflux-retention"
      RAMFLUX_RETENTION_ASYNC_PEER_CA_PEM_FILE: "/etc/ramflux/mesh/ca.pem"

  ramflux-retention:
    environment:
      RAMFLUX_RETENTION_ASYNC_INGRESS: "0"
